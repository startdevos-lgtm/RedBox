<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리도 득하자!!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════
       CSS CUSTOM PROPERTIES — 빨상 팔레트
    ══════════════════════════════════════ */
    :root {
      /* 던전 배경 */
      --bg:           #060106;
      --stone-dark:   #100508;
      --stone-mid:    #1c080d;
      --stone-light:  #2c1016;
      /* 빨상 레드 */
      --red-abyss:    #3a0608;
      --red-deep:     #7a0e10;
      --red-dark:     #aa1812;
      --red-mid:      #cc2218;
      --red-bright:   #e83020;
      --red-fire:     #ff4422;
      --red-glow:     #ff6644;
      --red-pale:     #ff9966;
      --red-white:    #ffded6;
      /* 골드 (체스트 금속 장식) */
      --gold:         #d4af37;
      --gold-light:   #f2dc6a;
      --gold-dark:    #9a7818;
      --gold-deep:    #5a4008;
      /* 텍스트 */
      --text-bright:  #fff5f0;
      --text-main:    #ffd8c0;
      --text-muted:   #c08878;
      --text-red:     #ff9977;
    }

    /* ══════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 28px 16px 44px;
      background: var(--bg);
      /* 던전 바닥의 빨간 에너지 잔광 */
      background-image:
        radial-gradient(ellipse at 50% 100%, rgba(180,10,0,0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 50%   0%, rgba(80,0,0,0.4)   0%, transparent 50%),
        radial-gradient(ellipse at 15% 50%, rgba(100,5,5,0.2)   0%, transparent 40%),
        radial-gradient(ellipse at 85% 50%, rgba(100,5,5,0.2)   0%, transparent 40%);
      font-family: 'Noto Serif KR', 'Georgia', serif;
      color: var(--text-main);
      overflow-x: hidden;
      position: relative;
    }

    /* 돌바닥 그레인 텍스처 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0, transparent 3px,
          rgba(255,60,20,0.025) 3px, rgba(255,60,20,0.025) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0, transparent 5px,
          rgba(0,0,0,0.06) 5px, rgba(0,0,0,0.06) 6px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── 상시 바닥 소용돌이 (chest ground swirl) ── */
    .swirl-bg {
      position: fixed;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .swirl-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
      animation: swirlSpin linear infinite;
    }
    .swirl-ring:nth-child(1) { border-color: rgba(200,20,5,0.28);  animation-duration: 12s; }
    .swirl-ring:nth-child(2) { inset: 40px;  border-color: rgba(220,40,10,0.22); animation-duration: 9s;   animation-direction: reverse; }
    .swirl-ring:nth-child(3) { inset: 90px;  border-color: rgba(255,80,30,0.18); animation-duration: 6.5s; }
    .swirl-ring:nth-child(4) { inset: 150px; border-color: rgba(255,120,60,0.14);animation-duration: 4.5s; animation-direction: reverse; }
    @keyframes swirlSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ══════════════════════════════════════
       SPARKLE CANVAS
    ══════════════════════════════════════ */
    #sparkleCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* ══════════════════════════════════════
       WRAPPER
    ══════════════════════════════════════ */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 740px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════════
       OUTER IRON FRAME — 빨상 에너지 테두리
    ══════════════════════════════════════ */
    .iron-frame {
      position: relative;
      padding: 5px;
      border-radius: 16px;
      background: linear-gradient(135deg,
        #2a0a08 0%, #4a1008 12%, #8a1810 28%,
        #cc2216 48%, #8a1810 68%, #4a1008 84%, #2a0a08 100%
      );
      box-shadow:
        0 0 0 1px #1a0404,
        0 0 25px rgba(200,30,10,0.7),
        0 0 60px rgba(200,30,10,0.35),
        0 0 110px rgba(180,20,5,0.18),
        0 28px 80px rgba(0,0,0,0.85);
      animation: frameEmber 3.5s ease-in-out infinite;
    }
    @keyframes frameEmber {
      0%,100% {
        box-shadow: 0 0 0 1px #1a0404, 0 0 25px rgba(200,30,10,0.7), 0 0 60px rgba(200,30,10,0.35), 0 0 110px rgba(180,20,5,0.18), 0 28px 80px rgba(0,0,0,0.85);
      }
      50% {
        box-shadow: 0 0 0 1px #2a0606, 0 0 40px rgba(230,50,15,0.9), 0 0 90px rgba(220,40,10,0.5),  0 0 150px rgba(200,20,5,0.28),  0 28px 80px rgba(0,0,0,0.85);
      }
    }
    /* 테두리 에너지 흐름 */
    .iron-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(
        110deg,
        transparent 15%,
        rgba(255,200,150,0.18) 45%,
        rgba(255,120,60,0.22)  50%,
        rgba(255,200,150,0.18) 55%,
        transparent 85%
      );
      background-size: 300% 300%;
      animation: frameFlow 2.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes frameFlow {
      0%   { background-position: -100% 0; }
      100% { background-position: 350%  0; }
    }

    /* ── 코너 — 빨상 금속 장식 ── */
    .corner {
      position: absolute;
      width: 50px; height: 50px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      pointer-events: none;
    }
    .c-icon {
      color: var(--red-pale);
      text-shadow: 0 0 10px var(--red-fire), 0 0 24px var(--red-bright);
      font-size: 20px;
      line-height: 1;
      animation: cornerPulse 2.2s ease-in-out infinite;
    }
    .c-icon.sm { font-size: 10px; color: var(--gold-light); text-shadow: 0 0 6px var(--gold); }
    .c-tl { top: -12px; left: -12px; }
    .c-tr { top: -12px; right: -12px; transform: scaleX(-1); }
    .c-bl { bottom: -12px; left: -12px; transform: scaleY(-1); }
    .c-br { bottom: -12px; right: -12px; transform: scale(-1,-1); }
    @keyframes cornerPulse {
      0%,100% { opacity: 0.7;  transform: scale(1);    }
      50%      { opacity: 1;   transform: scale(1.18); }
    }
    .c-tr .c-icon, .c-br .c-icon { animation-delay: 0.6s; }

    /* ══════════════════════════════════════
       STONE CHAMBER (던전 내부)
    ══════════════════════════════════════ */
    .stone-chamber {
      border-radius: 12px;
      padding: 32px 30px 24px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 0%,   rgba(180,20,5,0.22)  0%, transparent 55%),
        radial-gradient(ellipse at 50% 110%, rgba(200,10,0,0.35)  0%, transparent 50%),
        radial-gradient(ellipse at 20% 40%,  rgba(100,5,2,0.15)   0%, transparent 40%),
        radial-gradient(ellipse at 80% 60%,  rgba(100,5,2,0.15)   0%, transparent 40%),
        linear-gradient(180deg, #1e0a0c 0%, #160608 45%, #1a0808 100%);
    }
    /* 돌 균열/틈새 라이팅 */
    .stone-chamber::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg,  transparent 0, transparent 44px, rgba(180,20,5,0.04) 44px, rgba(180,20,5,0.04) 45px),
        repeating-linear-gradient(90deg, transparent 0, transparent 60px, rgba(0,0,0,0.06) 60px, rgba(0,0,0,0.06) 61px);
      border-radius: 12px;
      pointer-events: none;
    }
    /* 내부 빨간 에너지 인선 */
    .stone-chamber::after {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 1px solid rgba(180,30,10,0.22);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: inset 0 0 40px rgba(160,10,0,0.12);
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }
    .h-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }
    .h-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(200,30,10,0.5) 25%, rgba(255,100,50,0.9) 50%, rgba(200,30,10,0.5) 75%, transparent);
    }
    .h-sym {
      color: var(--red-glow);
      text-shadow: 0 0 10px var(--red-bright), 0 0 22px var(--red-mid);
      font-size: 17px;
      flex-shrink: 0;
      animation: symFlicker 2.8s ease-in-out infinite;
    }
    .h-sym.big { font-size: 24px; }
    @keyframes symFlicker {
      0%,100% { opacity: 0.72; transform: scale(1);    }
      40%      { opacity: 0.95; transform: scale(1.14); }
      55%      { opacity: 0.85; transform: scale(1.08); }
    }
    .title-main {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(18px, 4.3vw, 31px);
      font-weight: 900;
      color: var(--text-bright);
      text-shadow:
        0 0 12px rgba(255,180,120,0.9),
        0 0 28px rgba(230,50,15,0.75),
        0 0 55px rgba(200,20,5,0.5),
        2px 2px 0 rgba(100,5,0,0.6);
      letter-spacing: 1.2px;
      line-height: 1.3;
      margin: 6px 0 3px;
    }
    .title-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1.9vw, 11.5px);
      color: var(--red-pale);
      letter-spacing: 3.5px;
      text-transform: uppercase;
      opacity: 0.85;
      text-shadow: 0 0 8px var(--red-fire);
    }
    .nao-quote {
      font-size: clamp(11px, 2.2vw, 13px);
      color: var(--text-muted);
      font-style: italic;
      margin-top: 7px;
      letter-spacing: 0.3px;
      line-height: 1.65;
    }

    /* ══════════════════════════════════════
       RESULT SLOT CARDS — 빨상 임팩트 박스
    ══════════════════════════════════════ */
    .results-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }
    .slot-card {
      background: linear-gradient(155deg, rgba(40,5,5,0.85) 0%, rgba(28,6,8,0.9) 70%, rgba(50,8,5,0.8) 100%);
      border: 1.5px solid rgba(140,20,10,0.5);
      border-radius: 12px;
      padding: 18px 10px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.55s ease, border-color 0.55s ease;
    }
    .slot-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red-bright), rgba(255,200,150,0.8), var(--red-bright), transparent);
      opacity: 0.6;
    }
    .slot-card::after {
      content: '◆';
      position: absolute;
      top: 5px; right: 7px;
      font-size: 7px;
      color: rgba(200,50,20,0.5);
    }
    .slot-card.revealed {
      border-color: var(--red-fire);
      box-shadow: 0 0 20px rgba(220,40,10,0.6), 0 0 45px rgba(200,30,5,0.3), inset 0 0 30px rgba(180,15,0,0.18);
    }
    .slot-label {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: 2.5px;
      color: var(--red-pale);
      text-transform: uppercase;
      margin-bottom: 9px;
      text-shadow: 0 0 8px var(--red-fire);
    }
    .slot-number {
      font-family: 'Cinzel', serif;
      font-size: clamp(44px, 11vw, 66px);
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1;
      text-shadow: 0 0 10px rgba(255,180,120,0.7), 0 0 25px rgba(230,60,15,0.5), 2px 2px 0 rgba(80,5,0,0.5);
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      font-variant-numeric: tabular-nums;
    }
    .slot-number.spinning {
      color: var(--red-pale);
      text-shadow: 0 0 8px var(--red-fire);
      opacity: 0.75;
    }
    .slot-number.pop {
      animation: numPop 0.55s cubic-bezier(0.17, 0.89, 0.32, 1.27) forwards;
    }
    @keyframes numPop {
      0%   { transform: scale(1.7);  opacity: 0; filter: blur(6px) brightness(3); }
      55%  { transform: scale(0.93); opacity: 1; filter: blur(0)   brightness(1.2); }
      100% { transform: scale(1);   opacity: 1; filter: none; }
    }
    .slot-unit {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.4px;
    }
    .slot-comment {
      font-size: 10.5px;
      color: var(--red-white);
      font-style: italic;
      margin-top: 10px;
      line-height: 1.55;
      min-height: 30px;
      padding: 0 4px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.65s ease, transform 0.65s ease;
      text-shadow: 0 0 8px rgba(255,100,50,0.6);
    }
    .slot-comment.show { opacity: 1; transform: translateY(0); }

    /* ══════════════════════════════════════
       PARTY CARD
    ══════════════════════════════════════ */
    .party-card {
      background: linear-gradient(135deg,
        rgba(212,175,55,0.07) 0%,
        rgba(139,94,60,0.09) 100%
      );
      border: 1.5px solid rgba(212,175,55,0.32);
      border-radius: 13px;
      padding: 18px 20px 16px;
      margin-bottom: 20px;
      position: relative;
    }
    .party-card::before {
      content: '';
      position: absolute;
      top: -1px; left: 22%; right: 22%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.7;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2.5px;
      color: var(--red-pale);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 0 8px var(--red-fire);
    }

    /* +/- Controls */
    .party-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .party-btn {
      width: 44px;
      height: 44px;
      border: 2px solid var(--gold-dark);
      background: linear-gradient(145deg, #ecca60, #c8a020);
      color: var(--navy);
      font-size: 24px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.17s;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 3px 0 var(--gold-deep), 0 5px 10px rgba(0,0,0,0.22);
      user-select: none;
      flex-shrink: 0;
    }
    .party-btn:hover:not(:disabled) {
      background: linear-gradient(145deg, #f8e070, #d4af37);
      transform: translateY(-2px);
      box-shadow: 0 5px 0 var(--gold-deep), 0 8px 16px rgba(0,0,0,0.28);
    }
    .party-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--gold-deep), 0 2px 5px rgba(0,0,0,0.2);
    }
    .party-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .party-count-block {
      text-align: center;
      min-width: 86px;
    }
    .party-count-num {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
      text-shadow: 1px 1px 0 rgba(212,175,55,0.42);
      transition: transform 0.15s;
    }
    .party-count-num.bump {
      animation: countBump 0.2s ease-out;
    }
    @keyframes countBump {
      0%   { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .party-count-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    /* Member avatar grid */
    .member-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    .m-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(140,100,40,0.35);
      background: linear-gradient(135deg, rgba(170,135,80,0.22), rgba(90,65,30,0.25));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(100,70,30,0.42);
      transition: all 0.35s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.14);
      position: relative;
    }
    .m-avatar.active {
      border-color: var(--gold);
      background: linear-gradient(135deg, #f2dc6a, #c8a020);
      color: var(--navy);
      box-shadow: 0 2px 10px rgba(212,175,55,0.42);
    }
    .m-avatar.winner {
      border-color: #ff6830;
      background: linear-gradient(135deg, #ff9050, #d83800);
      color: #fff;
      box-shadow: 0 0 18px rgba(255,100,50,0.72), 0 0 36px rgba(255,100,50,0.3);
      animation: winnerBeat 0.85s ease-in-out infinite;
      z-index: 1;
    }
    .m-avatar.winner::after {
      content: '★';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--gold-light);
      text-shadow: 0 0 6px var(--gold);
      animation: starFloat 1.1s ease-in-out infinite;
    }

    @keyframes winnerBeat {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.2); }
    }
    @keyframes starFloat {
      0%,100% { transform: translateX(-50%) translateY(0);   opacity: 1; }
      50%      { transform: translateX(-50%) translateY(-4px); opacity: 0.6; }
    }

    /* ══════════════════════════════════════
       ORACLE BUTTON — 빨상 개방 버튼
    ══════════════════════════════════════ */
    .btn-area {
      text-align: center;
      margin: 22px 0 10px;
      position: relative;
      z-index: 2;
    }
    .btn-area::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 24px;
      background: radial-gradient(ellipse, rgba(200,30,10,0.45) 0%, transparent 70%);
      filter: blur(8px);
      pointer-events: none;
    }
    .oracle-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 20px 40px;
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(13.5px, 3vw, 17px);
      font-weight: 700;
      color: var(--text-bright);
      background: linear-gradient(135deg,
        #3a0a08 0%, #8a1410 20%, #cc2216 42%,
        #ff4422 55%, #cc2216 70%, #8a1410 85%, #3a0a08 100%
      );
      background-size: 300% 300%;
      border: 1.5px solid rgba(200,60,20,0.6);
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.4px;
      box-shadow: 0 4px 0 #1a0204, 0 8px 25px rgba(0,0,0,0.5), 0 0 25px rgba(200,30,10,0.45), inset 0 1px 0 rgba(255,180,120,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
      animation: btnEmber 4s ease infinite;
      user-select: none;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255,180,100,0.8), 0 1px 0 rgba(0,0,0,0.5);
    }
    @keyframes btnEmber {
      0%,100% { background-position:   0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .oracle-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent 25%, rgba(255,220,180,0.32) 50%, transparent 75%);
      animation: btnGloss 2.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes btnGloss {
      0%   { left: -120%; }
      100% { left:  240%; }
    }
    .oracle-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 7px 0 #1a0204, 0 14px 35px rgba(0,0,0,0.55), 0 0 40px rgba(230,50,15,0.65), inset 0 1px 0 rgba(255,180,120,0.3);
    }
    .oracle-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1a0204, 0 4px 10px rgba(0,0,0,0.3), 0 0 15px rgba(200,30,10,0.4);
    }
    .oracle-btn:disabled { animation: none; opacity: 0.6; cursor: wait; transform: none; }
    .oracle-btn:disabled::before { animation: none; }
    .btn-icon {
      font-size: 16px;
      display: inline-block;
      animation: iconFlame 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes iconFlame {
      0%,100% { transform: scale(1)    translateY(0);   }
      50%      { transform: scale(1.25) translateY(-2px); filter: brightness(1.4); }
    }
    .oracle-btn:disabled .btn-icon { animation: none; }

    /* ══════════════════════════════════════
       STATUS MESSAGE
    ══════════════════════════════════════ */
    .status-msg {
      text-align: center;
      font-size: 12.5px;
      color: var(--text-muted);
      font-style: italic;
      min-height: 22px;
      line-height: 1.65;
      transition: all 0.45s ease;
      padding: 0 8px;
      position: relative;
      z-index: 2;
    }
    .status-msg.result-state {
      color: var(--red-white);
      font-style: normal;
      font-weight: 700;
      font-size: 13.5px;
      text-shadow: 0 0 12px rgba(255,80,30,0.8), 0 0 28px rgba(220,30,5,0.5);
    }

    /* Animated dots — JS driven via data-dots attribute (CSS content animation is non-standard) */
    .dot-anim::after {
      content: attr(data-dots);
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .footer {
      margin-top: 22px;
      padding-top: 14px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .footer::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,30,10,0.5), transparent);
    }
    .footer-text {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: rgba(160,50,30,0.6);
      letter-spacing: 2px;
    }

    /* ══════════════════════════════════════
       빨상 BURST OVERLAY
    ══════════════════════════════════════ */
    #blessOverlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(ellipse at center,
        rgba(255,200,160,0.25) 0%,
        rgba(220,40,10,0.18)  25%,
        rgba(120,5,5,0.12)    55%,
        transparent           80%
      );
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #blessOverlay.on { opacity: 1; }

    /* 결과 발표 시 chest-open 화이트 플래시 */
    #chestFlash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9997;
      background: radial-gradient(ellipse at center,
        rgba(255,255,240,0.82) 0%,
        rgba(255,120,60,0.45)  30%,
        transparent            65%
      );
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #chestFlash.on { opacity: 1; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 520px) {
      body { padding: 14px 10px 30px; }

    /* ══════════════════════════════════════

</head>

<body>

  <script>
  /* ════════════════════════════════════════
     STATE
  ════════════════════════════════════════ */
  let partyCount  = 4;
  let spinning    = false;
  let audioCtx    = null;
  let dotInterval = null;  /* JS dot-animation timer */

  /* ── Channel comments (38 entries, cycling) ── */
  const CH_COMMENTS = [
    "빨간 서버의 기운이 진하게 느껴지는 성지",
    "오늘따라 보스 드롭률이 심상치 않은 그곳",
    "나오가 특별히 점지해준 붉은 기운 ✦",
    "에린 역사상 가장 많은 빨상이 나온 채널",
    "에린의 별빛이 유독 강하게 내리쬐는 공간",
    "얌전한 보스가 우리를 기다리는 그곳",
    "득템이 보장된, 오늘의 붉은 채널!",
    "동민이형이 가장 좋아하는 채널",
    "빨상과 가장 인연이 깊은 채널",
    "스택 많이 쌓인 채널? 그곳은 여기야!",
  ];

  /* ── Member comments ── */
  const MB_COMMENTS = [
    "오늘의 금손 밀레시안! 🌟",
    "에린에서 가장 운 좋은 손가락의 소유자",
    "나오의 선택을 받은 행운의 밀레시안",
    "운명의 신이 직접 점지한 득템 주인공",
    "오늘만큼은 에린 최강 럭키 파이터!",
    "빨상 오프너, 바로 이 밀레시안!",
    "나오조차 두 번 눈여겨본 행운의 손",
    "상자를 열면 무조건 득템이다! 의심 금지!",
    "야르렁!",
    "리슬은 똥손이지만 세바니까 견뎌//",
  ];

  function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /* ════════════════════════════════════════
     WEB AUDIO — Harp + Bell SFX
  ════════════════════════════════════════ */
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    /* FIX #4: resume suspended context (Chrome autoplay policy) */
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function tone(freq, type, vol, dur, delay = 0) {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime + delay;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + dur);
    gain.gain.setValueAtTime(vol * 0.9, t); // 전체 볼륨 10% 감소
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.start(t);
    osc.stop(t + dur + 0.01);
  }

  /* Harp pluck: sine + octave harmonic */
  function harp(freq, vol = 0.2, delay = 0) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + delay;
    [1, 2, 3].forEach((harmonic, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq * harmonic, t);
      const v = (vol * 0.9) / (i + 1); // 전체 볼륨 10% 감소
      g.gain.setValueAtTime(v, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9 - i * 0.15);
      o.start(t); o.stop(t + 1);
    });
  }

  function playClick() {
    ensureAudio();
    /* 둔탁한 클릭 + 작은 금속음 */
    tone(220, 'triangle', 0.16, 0.08);
    tone(440, 'sine',     0.10, 0.10, 0.04);
    tone(660, 'sine',     0.06, 0.08, 0.09);
  }

  function playTick() {
    ensureAudio();
    tone(200 + Math.random() * 200, 'sawtooth', 0.03, 0.05);
  }

  function playCelebration() {
    ensureAudio();
    /* 빨상 개방: 저음 충격 → 상승 아르페지오 */
    tone(80,  'sawtooth', 0.22, 0.35);
    tone(120, 'triangle', 0.15, 0.3,  0.05);
    const scale = [392, 493.88, 587.33, 698.46, 880, 1046.5, 1318.5, 1760];
    scale.forEach((f, i) => harp(f, 0.18, 0.12 + i * 0.08));
    setTimeout(() => {
      tone(1760, 'sine', 0.14, 1.1);
      tone(2093, 'sine', 0.09, 0.9, 0.06);
      tone(2637, 'sine', 0.06, 0.8, 0.12);
    }, scale.length * 80 + 100);
  }

  /* ════════════════════════════════════════
     PARTY MANAGEMENT
  ════════════════════════════════════════ */
  function adjustParty(delta) {
    if (spinning) return;  /* FIX #1: block party changes while spinning */
    const next = partyCount + delta;
    if (next < 1 || next > 8) return;
    playClick();
    partyCount = next;

    /* bump animation */
    const el = document.getElementById('partyNum');
    el.textContent = partyCount;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');

    document.getElementById('btnMinus').disabled = partyCount <= 1;
    document.getElementById('btnPlus').disabled  = partyCount >= 8;
    renderGrid(-1);
  }

  function renderGrid(winner = -1) {
    const grid = document.getElementById('memberGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
      const av = document.createElement('div');
      av.className = 'm-avatar';
      av.textContent = i;
      if (i <= partyCount) av.classList.add('active');
      if (i === winner)    av.classList.add('winner');
      grid.appendChild(av);
    }
  }

  /* ════════════════════════════════════════
     SPARKLE CANVAS
  ════════════════════════════════════════ */
  const canvas = document.getElementById('sparkleCanvas');
  const ctx2d  = canvas.getContext('2d');
  let particles = [];
  let rafId     = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const SPARK_COLORS = [
    '#ff2200', '#ff4422', '#ff6633',
    '#ff9944', '#ffcc44', '#ffffff',
    '#ffeecc', '#dd1100', '#ff8800'
  ];

  class Spark {
    constructor(cx, cy, burst) {
      if (burst) {
        this.x  = cx + (Math.random() - 0.5) * 200;
        this.y  = cy + (Math.random() - 0.5) * 200;
        const angle = Math.random() * Math.PI * 2;
        const spd   = 2.2 + Math.random() * 6.5;
        this.vx    = Math.cos(angle) * spd;
        this.vy    = Math.sin(angle) * spd - 2.8;
        this.size  = 2.0 + Math.random() * 5.0;
        this.decay = 0.010 + Math.random() * 0.022;
        this.isCore = Math.random() < 0.15;
        if (this.isCore) {
          this.color = '#ffffff';
          this.size  = 3.5 + Math.random() * 4;
        } else {
          this.color = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
        }
      } else {
        /* Ambient: 빨을 불씨가 위로 떠오름 */
        this.x     = Math.random() * canvas.width;
        this.y     = canvas.height + 10;
        this.vx    = (Math.random() - 0.5) * 1.0;
        this.vy    = -(Math.random() * 1.5 + 0.5);
        this.size  = 0.8 + Math.random() * 2.2;
        this.decay = 0.004 + Math.random() * 0.006;
        this.color = ['#ff2200','#ff4422','#ff6633','#ff9944'][Math.floor(Math.random()*4)];
        this.isCore = false;
      }
      this.life  = 1;
      this.rot   = Math.random() * Math.PI * 2;
      this.rotV  = (Math.random() - 0.5) * 0.25;
      this.isStar = Math.random() > 0.45;
    }

    update() {
      this.x   += this.vx;
      this.y   += this.vy;
      this.vy  += this.isCore ? 0.06 : 0.12;
      this.vx  *= 0.984;
      this.life -= this.decay;
      this.rot  += this.rotV;
      return this.life > 0;
    }

    draw() {
      ctx2d.save();
      ctx2d.globalAlpha = Math.max(0, this.life);
      ctx2d.translate(this.x, this.y);
      ctx2d.rotate(this.rot);
      ctx2d.fillStyle   = this.color;
      ctx2d.shadowColor = this.isCore ? '#ffffff' : this.color;
      ctx2d.shadowBlur  = this.isCore ? 18 : 9;
      if (this.isStar) {
        starPath(ctx2d, 0, 0, this.size, this.size * 0.42, 4);
      } else {
        ctx2d.beginPath();
        ctx2d.ellipse(0, 0, this.size / 2, this.size / 3.5, 0, 0, Math.PI * 2);
      }
      ctx2d.fill();
      ctx2d.restore();
    }
  }

  function starPath(c, x, y, r, ir, pts) {
    c.beginPath();
    for (let i = 0; i < pts * 2; i++) {
      const rad = (i % 2 === 0) ? r : ir;
      const a   = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
      i === 0
        ? c.moveTo(x + rad * Math.cos(a), y + rad * Math.sin(a))
        : c.lineTo(x + rad * Math.cos(a), y + rad * Math.sin(a));
    }
    c.closePath();
  }

  function renderParticles() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.update());
    particles.forEach(p => p.draw());
    rafId = particles.length > 0 ? requestAnimationFrame(renderParticles) : null;
  }

  function burst(count = 140) {
    const cx = canvas.width  / 2;
    const cy = canvas.height * 0.36;
    for (let i = 0; i < count; i++) particles.push(new Spark(cx, cy, true));
    if (!rafId) rafId = requestAnimationFrame(renderParticles);
  }

  /* 상시 빨은 불씨 */
  setInterval(() => {
    if (particles.length < 20) {
      particles.push(new Spark(0, 0, false));
      if (!rafId) rafId = requestAnimationFrame(renderParticles);
    }
  }, 480);

  /* ════════════════════════════════════════
     JS DOT ANIMATION
  ════════════════════════════════════════ */
  const DOT_STATES = ['', '.', '..', '...'];
  function startDotAnim(el) {
    stopDotAnim();
    let idx = 0;
    el.dataset.dots = DOT_STATES[idx];
    dotInterval = setInterval(() => {
      idx = (idx + 1) % DOT_STATES.length;
      el.dataset.dots = DOT_STATES[idx];
    }, 300);
  }
  function stopDotAnim() {
    if (dotInterval !== null) { clearInterval(dotInterval); dotInterval = null; }
  }

  /* ════════════════════════════════════════
     빨상 CHEST FLASH
  ════════════════════════════════════════ */
  function doChestFlash() {
    const f = document.getElementById('chestFlash');
    f.classList.add('on');
    setTimeout(() => {
      f.style.transition = 'opacity 0.7s ease';
      f.classList.remove('on');
      setTimeout(() => { f.style.transition = 'opacity 0.1s ease'; }, 800);
    }, 80);
  }

  /* ════════════════════════════════════════
     SLOT-MACHINE ORACLE
  ════════════════════════════════════════ */
  function invokeOracle() {
    if (spinning) return;
    spinning = true;

    ensureAudio();
    playClick();

    /* Cache DOM */
    const oracleBtn    = document.getElementById('oracleBtn');
    const statusEl     = document.getElementById('statusMsg');
    const chanNumEl    = document.getElementById('channelNum');
    const membNumEl    = document.getElementById('memberNum');
    const chanCard     = document.getElementById('channelCard');
    const membCard     = document.getElementById('memberCard');
    const chanComment  = document.getElementById('channelComment');
    const membComment  = document.getElementById('memberComment');
    const overlay      = document.getElementById('blessOverlay');
    const btnMinus     = document.getElementById('btnMinus');
    const btnPlus      = document.getElementById('btnPlus');

    /* FIX #7: capture partyCount at spin-start; immune to mid-spin changes */
    const localPartyCount = partyCount;

    /* Reset UI */
    oracleBtn.disabled = true;
    btnMinus.disabled  = true;   /* FIX #1: lock party buttons during spin */
    btnPlus.disabled   = true;

    chanCard.classList.remove('revealed');
    membCard.classList.remove('revealed');
    chanComment.classList.remove('show');
    membComment.classList.remove('show');
    chanNumEl.classList.remove('pop', 'spinning');
    membNumEl.classList.remove('pop', 'spinning');

    /* FIX #6: reset numbers immediately to avoid flash of old result */
    chanNumEl.textContent = '–';
    membNumEl.textContent = '–';

    renderGrid(-1);

    /* Draw final values */
    const finalChan = Math.floor(Math.random() * 38) + 1;
    const finalMemb = Math.floor(Math.random() * localPartyCount) + 1;

    /* Activate overlay */
    overlay.classList.add('on');
    statusEl.className = 'status-msg';
    const dotSpan = document.createElement('span');
    dotSpan.className = 'dot-anim';
    dotSpan.textContent = '빨상이 열리는 중 — 운명을 점치는 중';
    statusEl.innerHTML = '';
    statusEl.appendChild(dotSpan);
    startDotAnim(dotSpan);

    /* Begin spinning */
    chanNumEl.classList.add('spinning');
    membNumEl.classList.add('spinning');

    const TOTAL_MS       = 1900;
    const START_INTERVAL =   35;  /* ms — fast start */
    const END_INTERVAL   =  280;  /* ms — slow finish */
    const startTime      = performance.now();
    let   tickCount      = 0;

    /* Ease-out: slow down toward end */
    function easeOut(t) { return 1 - Math.pow(1 - t, 2.2); }

    /* Near-miss convergence on last few ticks */
    function nearMissValue(final, range, max) {
      const offset = Math.floor(Math.random() * (range * 2 + 1)) - range;
      return Math.max(1, Math.min(max, final + offset));
    }

    function tick() {
      const elapsed  = performance.now() - startTime;
      const progress = Math.min(elapsed / TOTAL_MS, 1);

      if (progress >= 1) {
        reveal();
        return;
      }

      const interval = START_INTERVAL + (END_INTERVAL - START_INTERVAL) * easeOut(progress);

      /* Near-miss in last 20% — numbers creep toward final */
      if (progress > 0.80) {
        chanNumEl.textContent = nearMissValue(finalChan, 4, 38);
        membNumEl.textContent = nearMissValue(finalMemb, 2, localPartyCount);
      } else {
        chanNumEl.textContent = Math.floor(Math.random() * 38) + 1;
        membNumEl.textContent = Math.floor(Math.random() * localPartyCount) + 1;
      }

      if (tickCount % 4 === 0) playTick();
      tickCount++;

      setTimeout(tick, interval);
    }

    /* FIX #2: try-finally guarantees spinning flag always resets */
    function resetControls() {
      stopDotAnim();
      spinning           = false;
      oracleBtn.disabled = false;
      /* FIX #1: restore party buttons to correct disabled state */
      btnMinus.disabled  = partyCount <= 1;
      btnPlus.disabled   = partyCount >= 8;
      overlay.classList.remove('on');
    }

    function reveal() {
      try {
        chanNumEl.classList.remove('spinning');
        membNumEl.classList.remove('spinning');

        /* Channel reveal */
        chanNumEl.textContent = finalChan;
        void chanNumEl.offsetWidth;           /* force reflow to restart animation */
        chanNumEl.classList.add('pop');
        chanCard.classList.add('revealed');

        /* Member reveal — 320ms stagger */
        setTimeout(() => {
          try {
            membNumEl.textContent = finalMemb;
            void membNumEl.offsetWidth;
            membNumEl.classList.add('pop');
            membCard.classList.add('revealed');

            /* Comments */
            chanComment.textContent = rnd(CH_COMMENTS);
            membComment.textContent = rnd(MB_COMMENTS);
            setTimeout(() => {
              chanComment.classList.add('show');
              membComment.classList.add('show');
            }, 80);

            /* Highlight winner */
            renderGrid(finalMemb);

            /* 빨상 개방 이펙트 */
            doChestFlash();
            burst(150);
            playCelebration();

            /* Status */
            statusEl.className   = 'status-msg result-state';
            statusEl.textContent =
              `🔥 ${finalChan}채널, ${finalMemb}번 밀레시안이여! 빨상이 열렸다! 🔥`;
          } finally {
            resetControls();  /* FIX #2: always re-enable controls */
          }
        }, 320);
      } catch (e) {
        resetControls();  /* FIX #2: safety net for synchronous errors */
        throw e;
      }
    }

    /* Kick off */
    setTimeout(tick, 0);
  }

  /* ════════════════════════════════════════
     INIT
  ════════════════════════════════════════ */
  (function init() {
    /* FIX #9: sync partyNum DOM to JS state (don't rely on HTML literal) */
    document.getElementById('partyNum').textContent = partyCount;
    document.getElementById('btnMinus').disabled = partyCount <= 1;
    document.getElementById('btnPlus').disabled  = partyCount >= 8;
    renderGrid(-1);
  })();
  </script>
</body>
</html>
